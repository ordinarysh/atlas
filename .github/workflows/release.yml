name: Release

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run in dry-run mode (no actual release)"
        type: boolean
        default: false

# Prevent concurrent releases
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

jobs:
  semantic-release:
    name: Semantic Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      released: ${{ steps.release.outputs.released }}
      version: ${{ steps.release.outputs.version }}
      channel: ${{ steps.release.outputs.channel }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Enable Corepack
        run: corepack enable

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify commit compliance
        run: |
          # Only check the last commit to avoid failing on old commits
          if [[ "${{ github.event_name }}" == "push" ]]; then
            pnpm exec commitlint --from HEAD~1 --to HEAD --verbose
          fi

      - name: Run semantic-release
        id: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_AUTHOR_NAME: "github-actions[bot]"
          GIT_AUTHOR_EMAIL: "github-actions[bot]@users.noreply.github.com"
          GIT_COMMITTER_NAME: "github-actions[bot]"
          GIT_COMMITTER_EMAIL: "github-actions[bot]@users.noreply.github.com"
        run: |
          if [[ "${{ github.event.inputs.dry_run }}" == "true" ]]; then
            echo "🔍 Running semantic-release in dry-run mode..."
            npx semantic-release --dry-run
          else
            echo "🚀 Running semantic-release..."
            npx semantic-release
          fi

          # Check if a release was created
          if [[ -f ".VERSION" ]]; then
            VERSION=$(cat .VERSION)
            echo "released=true" >> $GITHUB_OUTPUT
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            if [[ "${{ github.ref }}" == "refs/heads/develop" ]]; then
              echo "channel=beta" >> $GITHUB_OUTPUT
            else
              echo "channel=latest" >> $GITHUB_OUTPUT
            fi
            echo "✅ Released version: $VERSION"
          else
            echo "released=false" >> $GITHUB_OUTPUT
            echo "ℹ️ No release created"
          fi

      - name: Clean up artifacts
        if: always()
        run: |
          # Remove version file to avoid conflicts
          rm -f .VERSION
  validate-versions:
    name: Validate Runtime Versions
    needs: semantic-release
    if: needs.semantic-release.outputs.released == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Node setup using node-version-file per Context 7
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      # Corepack for pnpm version resolution
      - name: Enable Corepack
        run: corepack enable

      - name: Prepare pnpm
        run: corepack prepare pnpm@latest --activate

      - name: Validate Node.js version
        run: |
          NODE_VERSION=$(node --version | sed 's/v//')
          MIN_VERSION="22.18.0"
          if ! npx semver "$NODE_VERSION" -r ">=$MIN_VERSION"; then
            echo "❌ Node.js version $NODE_VERSION does not satisfy >=$MIN_VERSION"
            exit 1
          fi
          echo "✅ Node.js version $NODE_VERSION satisfies >=$MIN_VERSION"

      - name: Validate pnpm version
        run: |
          PNPM_VERSION=$(pnpm --version)
          MIN_VERSION="10.14.0"
          if ! npx semver "$PNPM_VERSION" -r ">=$MIN_VERSION"; then
            echo "❌ pnpm version $PNPM_VERSION does not satisfy >=$MIN_VERSION"
            exit 1
          fi
          echo "✅ pnpm version $PNPM_VERSION satisfies >=$MIN_VERSION"

  pre-flight-check:
    name: Pre-flight Checks
    needs: [semantic-release, validate-versions]
    if: needs.semantic-release.outputs.released == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Enable Corepack
        run: corepack enable

      # pnpm cache setup per Context 7 recommendations
      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ hashFiles('**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}-
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check for forbidden artifacts before packaging
        run: |
          echo "Pre-flight check: Ensuring no forbidden artifacts exist..."
          FORBIDDEN_PATTERNS=(
            "node_modules"
            ".turbo"
            ".next"
            "dist"
            "*.tsbuildinfo"
            "package-lock.json"
            "yarn.lock"
            "pnpm-lock.yaml"
            ".env"
            ".env.local"
            ".env.production"
          )

          FOUND_ARTIFACTS=()
          for pattern in "${FORBIDDEN_PATTERNS[@]}"; do
            if find templates -name "$pattern" -o -path "*/$pattern/*" 2>/dev/null | grep -q .; then
              FOUND_ARTIFACTS+=("$pattern")
              find templates -name "$pattern" -o -path "*/$pattern/*" 2>/dev/null | head -10
            fi
          done

          if [ ${#FOUND_ARTIFACTS[@]} -gt 0 ]; then
            echo "❌ Found forbidden artifacts in templates: ${FOUND_ARTIFACTS[*]}"
            echo "Please clean templates before release"
            exit 1
          fi
          echo "✅ Pre-flight check passed - no forbidden artifacts found"

      - name: Run all root checks
        run: |
          echo "Running lint..."
          pnpm lint

          echo "Running typecheck..."
          pnpm typecheck

          echo "Running validation..."
          pnpm validate

          echo "Running tests..."
          BUILD_SMOKE=skip pnpm test:ci

  build-artifacts:
    name: Build Release Artifacts
    needs: [semantic-release, pre-flight-check]
    if: needs.semantic-release.outputs.released == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    outputs:
      version: ${{ needs.semantic-release.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Enable Corepack
        run: corepack enable

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ hashFiles('**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}-
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set version from semantic-release
        run: |
          VERSION="${{ needs.semantic-release.outputs.version }}"
          echo "Building artifacts for version: $VERSION"
          echo "$VERSION" > .VERSION

      - name: Build release artifacts
        run: |
          echo "Building release artifacts..."
          pnpm build:release

          echo "Artifacts built:"
          ls -lah release/

      - name: Verify SHA256 checksums were generated
        run: |
          cd release
          if [ -f SHA256SUMS ]; then
            echo "✅ SHA256SUMS file exists"
            echo "Checksums:"
            cat SHA256SUMS
          else
            echo "❌ SHA256SUMS file not found"
            exit 1
          fi

      - name: Verify artifact sizes
        run: |
          MAX_SIZE_MB=25
          MAX_SIZE_BYTES=$((MAX_SIZE_MB * 1024 * 1024))

          for artifact in release/*.tar.gz release/*.tgz; do
            if [ -f "$artifact" ]; then
              SIZE=$(stat -f%z "$artifact" 2>/dev/null || stat -c%s "$artifact")
              SIZE_MB=$((SIZE / 1024 / 1024))
              ARTIFACT_NAME=$(basename "$artifact")
              
              if [ $SIZE -gt $MAX_SIZE_BYTES ]; then
                echo "❌ Artifact $ARTIFACT_NAME exceeds size limit: ${SIZE_MB}MB > ${MAX_SIZE_MB}MB"
                exit 1
              else
                echo "✅ Artifact $ARTIFACT_NAME size: ${SIZE_MB}MB"
              fi
            fi
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: release/
          retention-days: 7

  determinism-probe:
    name: Determinism Probe (Optional)
    needs: [semantic-release, build-artifacts]
    if: needs.semantic-release.outputs.released == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: true
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Enable Corepack
        run: corepack enable

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ hashFiles('**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}-
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download first build artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: release-first/

      - name: Rebuild artifacts
        run: |
          echo "Rebuilding artifacts for determinism check..."
          pnpm build:release

      - name: Compare SHA256 checksums
        run: |
          echo "Comparing checksums for determinism..."

          if diff release-first/SHA256SUMS release/SHA256SUMS; then
            echo "✅ Build is deterministic - SHA256 checksums match!"
          else
            echo "⚠️ Build is non-deterministic - SHA256 checksums differ"
            echo "First build:"
            cat release-first/SHA256SUMS
            echo "Rebuild:"
            cat release/SHA256SUMS
          fi

  create-release:
    name: Create GitHub Release
    needs: [semantic-release, build-artifacts, determinism-probe]
    if: always() && needs.semantic-release.outputs.released == 'true' && needs.build-artifacts.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: release/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.semantic-release.outputs.version }}
          name: Atlas Templates ${{ needs.semantic-release.outputs.version }}
          draft: false
          prerelease: ${{ contains(needs.semantic-release.outputs.version, '-') || needs.semantic-release.outputs.channel == 'beta' }}
          generate_release_notes: true
          files: |
            release/*.tar.gz
            release/*.tgz
            release/index.json
            release/SHA256SUMS
          body: |
            ## Atlas Templates ${{ needs.semantic-release.outputs.version }}

            ### Release Artifacts
            - Core templates package
            - Addons packages
            - Migration scripts
            - SHA256 checksums for verification

            ### Installation
            ```bash
            # Download and verify checksums
            curl -LO https://github.com/${{ github.repository }}/releases/download/${{ needs.semantic-release.outputs.version }}/SHA256SUMS
            sha256sum -c SHA256SUMS
            ```

            ### Checksums
            See `SHA256SUMS` file in release assets for artifact verification.

            ---
            *Built with Node.js 22.18+ and pnpm 10.14.0+*

  timing-report:
    name: Release Timing Report
    needs: create-release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: always()
    permissions:
      contents: read
    steps:
      - name: Calculate workflow duration
        run: |
          START_TIME="${{ github.event.head_commit.timestamp }}"
          CURRENT_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          if command -v python3 >/dev/null 2>&1; then
            DURATION=$(python3 -c "
          from datetime import datetime
          start = datetime.fromisoformat('${START_TIME}'.replace('Z', '+00:00'))
          end = datetime.fromisoformat('${CURRENT_TIME}'.replace('Z', '+00:00'))
          duration = (end - start).total_seconds() / 60
          print(f'{duration:.1f}')
          ")
            
            echo "⏱️ Total release duration: ${DURATION} minutes"
            
            if (( $(echo "$DURATION > 8" | bc -l) )); then
              echo "⚠️ Release duration exceeds 8 minutes. Consider optimizations:"
              echo "  - Parallelize artifact builds where possible"
              echo "  - Optimize build scripts"
              echo "  - Consider using build caching strategies"
            fi
          fi
